name: kindi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.2.0
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5
  path: ^1.8.3
  pie_chart: ^5.4.0
  share_plus: ^10.0.0
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^5.0.0

# ✅ Configuration icône launcher
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  # Image principale (utilisée pour iOS + Android < 8.0)
  image_path: "assets/images/kindi.jpeg"
  # Android 8.0+ — icône adaptative
  adaptive_icon_background: "#FF9800"
  # ⚠️  Le foreground DOIT être un PNG avec fond transparent
  # Si logo.jpeg n'a pas de fond transparent → utiliser image_path directement
  adaptive_icon_foreground: "assets/images/logo_foreground.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true

  assets:
    # ✅ Chemin correct (avec le préfixe assets/)
    - assets/images/kindi.jpeg
    - assets/images/logo_foreground.png 